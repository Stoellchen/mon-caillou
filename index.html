<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SYSTEM READY</title>
</head>
<body>
<script>
  const pages = ["si.html", "sb.html"
              ,"fr1.html","fr2.html","fr3.html","fr4.html","fr5.html","fr6.html"
              ,"gi1.html","gi2.html","gi3.html","gi4.html","gi5.html","gi6.html"
            ];
  const chosenPage = pages[Math.floor(Math.random() * pages.length)];

  fetch(chosenPage)
    .then(response => {
      if (!response.ok) {
        throw new Error("Datei konnte nicht geladen werden: " + chosenPage);
      }
      return response.text();
    })
    .then(html => {
      document.open();
      document.write(html);
      document.close();
    })
    .catch(err => {
      document.body.innerHTML = `
        <div style="background:#000;color:#fff;font-family:monospace;padding:20px">
          Fehler beim Laden von <b>${chosenPage}</b><br><br>${err.message}
        </div>
      `;
    });
</script>
</body>
</html>
